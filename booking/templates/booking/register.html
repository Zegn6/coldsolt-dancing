{% extends 'booking/base.html' %}

{% block title %}Register - COLDSOLT Dancing{% endblock %}

{% block content %}
<h2>Register</h2>

{% if error %}
    <p class="error">{{ error }}</p>
{% endif %}

<form method="post">
    {% csrf_token %}
    <label>Name: <input type="text" name="name" value="{{ name|default:'' }}" required></label><br><br>
    <label>Password: <input type="password" name="password" required></label><br><br>
    <p><small>Password must be at least 4 characters.</small></p>
    <button type="submit">Register</button>
</form>
<p>Already have an account? <a href="/login/">Login here</a></p>
{% endblock %}
