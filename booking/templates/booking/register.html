{% extends 'booking/base.html' %}

{% block title %}Register - COLDSOLT Dancing{% endblock %}

{% block content %}
<h2>Register</h2>

{% if error %}
    <div class="message-error" role="alert">{{ error }}</div>
{% endif %}

<form method="post" novalidate>
    {% csrf_token %}
    <div class="form-group">
        <label for="name">Name:</label>
        <input type="text"
               id="name"
               name="name"
               value="{{ name|default:'' }}"
               required
               autocomplete="username"
               aria-describedby="name-hint">
    </div>

    <div class="form-group">
        <label for="password">Password:</label>
        <input type="password"
               id="password"
               name="password"
               required
               autocomplete="new-password"
               aria-describedby="password-hint">
        <span id="password-hint" class="hint">At least 4 characters.</span>
    </div>

    <button type="submit">Register</button>
</form>
<a href="/login/" class="link-secondary">Already have an account? Login here</a>
{% endblock %}
