{% extends 'booking/base.html' %}

{% block title %}Login - COLDSOLT Dancing{% endblock %}

{% block content %}
<h2>Login</h2>

{% if error %}
    <div class="message-error" role="alert">{{ error }}</div>
{% endif %}

<form method="post" novalidate>
    {% csrf_token %}
    <div class="form-group">
        <label for="name">Name:</label>
        <input type="text"
               id="name"
               name="name"
               value="{{ name|default:'' }}"
               required
               autocomplete="username">
    </div>

    <div class="form-group">
        <label for="password">Password:</label>
        <input type="password"
               id="password"
               name="password"
               required
               autocomplete="current-password">
    </div>

    <button type="submit">Login</button>
</form>
<a href="/register/" class="link-secondary">Don't have an account? Register here</a>
{% endblock %}
