{% if dates %}
<div class="card">
    <h3>
        <span class="step-badge">2</span>
        Pick a date &amp; time
    </h3>
    <form hx-post="/reserve/"
          hx-target="#result"
          hx-swap="innerHTML"
          hx-disabled-elt="button[type='submit']">
        {% csrf_token %}
        <input type="hidden" name="instructor_id" value="{{ instructor.id }}">

        <div class="form-group">
            <label for="date-select">AVAILABLE DATE</label>
            <select id="date-select" name="date" required>
                {% for date in dates %}
                    <option value="{{ date|date:'Y-m-d' }}">{{ date|date:'D, M j, Y' }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>TIME SLOT</label>
            <div class="slot-grid">
                <label class="slot-label">
                    <input type="radio" name="slot" value="1" required class="slot-radio">
                    <div class="slot-btn">🌅 Morning</div>
                </label>
                <label class="slot-label">
                    <input type="radio" name="slot" value="2" class="slot-radio">
                    <div class="slot-btn">☀️ Afternoon</div>
                </label>
                <label class="slot-label">
                    <input type="radio" name="slot" value="3" class="slot-radio">
                    <div class="slot-btn">🌙 Evening</div>
                </label>
            </div>
        </div>

        <div class="form-group">
            <label for="name-input">YOUR NAME</label>
            <input type="text"
                   id="name-input"
                   name="name"
                   value="{{ request.session.user_name|default:'' }}"
                   placeholder="Enter your name"
                   required
                   autocomplete="name">
        </div>

        <button type="submit" class="reserve-btn">Reserve Now</button>
    </form>
    <div id="result" aria-live="polite" style="margin-top: 12px;"></div>
</div>
{% else %}
<div class="card">
    <p style="color:#C2526F; font-size:13px;">
        No available dates for this instructor. Please choose another.
    </p>
</div>
{% endif %}
