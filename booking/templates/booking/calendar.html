{% if dates %}
<div class="card">
    <h3>
        <span class="step-badge">2</span>
        Pick a date &amp; time
    </h3>
    <form method="post" action="/reserve/">
        {% csrf_token %}
        <input type="hidden" name="instructor_id" value="{{ instructor.id }}">

        <div class="form-group">
            <label for="date-select">AVAILABLE DATE</label>
            <select id="date-select" name="date" required>
                {% for date in dates %}
                    <option value="{{ date|date:'Y-m-d' }}">{{ date|date:'D, M j, Y' }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>TIME SLOT</label>
            <div class="slot-grid">
                <label style="cursor:pointer;">
                    <input type="radio" name="slot" value="1" required style="display:none">
                    <div class="slot-btn">🌅 Morning</div>
                </label>
                <label style="cursor:pointer;">
                    <input type="radio" name="slot" value="2" style="display:none">
                    <div class="slot-btn">☀️ Afternoon</div>
                </label>
                <label style="cursor:pointer;">
                    <input type="radio" name="slot" value="3" style="display:none">
                    <div class="slot-btn">🌙 Evening</div>
                </label>
            </div>
        </div>

        <div class="form-group">
            <label for="name-input">YOUR NAME</label>
            <input type="text"
                   id="name-input"
                   name="name"
                   value="{{ request.session.user_name|default:'' }}"
                   placeholder="Enter your name"
                   required
                   autocomplete="name">
        </div>

        <button type="submit">Reserve Now</button>
    </form>
    <div id="result" aria-live="polite"></div>
</div>
{% else %}
<div class="card">
    <p style="color:#C2526F; font-size:13px;">
        No available dates for this instructor. Please choose another.
    </p>
</div>
{% endif %}
